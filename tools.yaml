# Google GenAI Toolbox Configuration
# See https://github.com/googleapis/genai-toolbox for all options

# 1. Define your data sources (PostgreSQL, BigQuery, Cloud SQL, etc.)
kind: source
name: main-db
type: postgres
host: ${DB_HOST:localhost}
port: 5432
database: ${DB_NAME:my_db}
user: ${DB_USER}
password: ${DB_PASSWORD}

---
# 2. Define specific "Tools" the AI can use to access data
# This is SAFER than raw SQL because you control the statement and parameters.
kind: tool
name: query_user_records
type: postgres-sql
source: main-db
description: "Fetches user profile data from the database by user ID."
parameters:
  - name: user_id
    type: integer
    description: "The unique ID of the user."
statement: "SELECT id, name, email FROM users WHERE id = $1"

---
