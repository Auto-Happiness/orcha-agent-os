
# datasamples/docker-compose.yml
services:
  mysql:
    image: mysql:8.0
    container_name: orcha-mysql-test
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orcha_test
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysqlsampledatabase.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      backend:
        aliases:
          - db

  adminer:
    image: adminer
    container_name: orcha-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
